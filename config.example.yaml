remote:
  host: "192.168.1.100"
  port: 22
  username: "your_user"
  remote_base_dir: "/tmp/remote_job_runner"

auth:
  key_file: null
  password: null
  password_env: "WORKSTATION_PASSWORD"

job:
  source_dir: "/path/to/source"
  enable_logs: true
  show_progress: true
  cleanup_remote_on_success: true
  cleanup_remote_on_failure: false
  verify_hash: false
  skip_symlinks: false
  max_captured_output_bytes: 1048576

transfer:
  method: "sftp"
  sftp_max_workers: 4
  include_globs:
    - "**/*"
  exclude_globs:
    - ".git/**"
    - "__pycache__/**"
    - "*.tmp"
    - ".remote_job_runner_logs/**"
    - ".remote_job_runner_download_*/**"
    - ".remote_job_runner_overwritten_backup/**"

results:
  remote_paths:
    - "outputs/**"
    - "result.csv"
  local_base_dir: null
  allow_local_base_dir_outside_source: false
  overwrite: true
  backup_overwritten: true
  sync_mode: "merge"

stages:
  - name: "run"
    mode: "sequential"
    commands:
      - name: "run_main"
        cmd: "python test.py > /dev/null"
        timeout_sec: 3600

  - name: "parallel_cases"
    mode: "parallel"
    max_workers: 2
    commands:
      - name: "case_a"
        cmd: "python test.py --case A > /dev/null"
        timeout_sec: 3600
      - name: "case_b"
        cmd: "python test.py --case B > /dev/null"
        timeout_sec: 3600
